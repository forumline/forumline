when:
  - event: push
    branch: main
    path:
      include:
        - "deploy/compose/logs-agent/**"
  - event: manual

steps:
  - name: deploy
    image: bash
    commands:
      - |
        HOSTS="forum-prod forumline-prod website-prod hosted-prod auth-prod"
        for HOST in $HOSTS; do
          echo "=== Deploying Vector agent to $HOST ==="
          REMOTE="/opt/logs-agent"

          # Generate host-specific vector config
          sed "s/\$${LOGS_HOST_LABEL}/$HOST/" deploy/compose/logs-agent/vector.toml > /tmp/vector-$HOST.toml

          ssh $HOST "mkdir -p $REMOTE"
          scp deploy/compose/logs-agent/docker-compose.yml "$HOST:$REMOTE/docker-compose.yml"
          scp /tmp/vector-$HOST.toml "$HOST:$REMOTE/vector.toml"
          ssh $HOST "cd $REMOTE && docker compose pull && docker compose up -d --force-recreate --remove-orphans"
          rm -f /tmp/vector-$HOST.toml
        done
