name: Deploy Forumline Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go-services/**'
      - 'examples/forum-a/src/**'
      - 'examples/forum-a/index.html'
      - 'examples/forum-a/vite.config.js'
      - 'examples/forum-a/package.json'
      - 'Dockerfile.go-forum'
      - '.github/workflows/deploy-forum.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FORUM_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<EOF
          Host forum-prod
            HostName ssh.forumline.net
            User root
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy
        run: |
          ssh forum-prod "cd /opt/forum/repo && git pull origin main && cd /opt/forum && docker compose up -d --build forum && docker compose ps"
