name: Deploy Forumline Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'packages/**'
      - 'package-lock.json'

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      project-id: prj_Q6NCsZIw3eRbYLQFMTkLon3wZ3Nk
      working-directory: demo
      packages-to-build: packages/protocol packages/server-sdk
      sync-commands: |
        cp -r packages/protocol/dist/* demo/node_modules/@johnvondrashek/forumline-protocol/dist/
        cp packages/protocol/package.json demo/node_modules/@johnvondrashek/forumline-protocol/package.json
        cp -r packages/server-sdk/dist/* demo/node_modules/@johnvondrashek/forumline-server-sdk/dist/
        cp packages/server-sdk/package.json demo/node_modules/@johnvondrashek/forumline-server-sdk/package.json
    secrets: inherit
