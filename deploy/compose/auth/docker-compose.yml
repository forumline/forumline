services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: zitadel
    volumes:
      - /opt/auth/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d zitadel -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zitadel

  zitadel-init:
    image: ghcr.io/zitadel/zitadel:v4.11.0
    command: init zitadel
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
    networks:
      - zitadel

  zitadel-setup:
    image: ghcr.io/zitadel/zitadel:v4.11.0
    command: setup --masterkey "${ZITADEL_MASTERKEY}"
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: auth.forumline.net
      ZITADEL_EXTERNALPORT: "443"
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_TLS_ENABLED: "false"
      # First instance admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "true"
      # Service account for API access (forum registration, user management)
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: forumline-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: "Forumline Service Account"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/sa.pat
      # Login V2 client
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: "Login UI Service Account"
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      # Login V2 URLs
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: "https://auth.forumline.net/ui/v2/login/"
      ZITADEL_OIDC_DEFAULTLOGINURLV2: "https://auth.forumline.net/ui/v2/login/login?authRequest="
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: "https://auth.forumline.net/ui/v2/login/logout?post_logout_redirect="
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    networks:
      - zitadel

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.11.0
    command: start --masterkey "${ZITADEL_MASTERKEY}"
    restart: unless-stopped
    depends_on:
      zitadel-setup:
        condition: service_completed_successfully
    environment:
      ZITADEL_PORT: "8080"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: auth.forumline.net
      ZITADEL_EXTERNALPORT: "443"
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - zitadel
    labels:
      - traefik.enable=true
      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c
      - traefik.http.routers.zitadel-api.rule=PathPrefix(`/`)
      - traefik.http.routers.zitadel-api.priority=1
      - traefik.http.routers.zitadel-api.entrypoints=web
      - traefik.http.routers.zitadel-api.service=zitadel-api

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.11.0
    restart: unless-stopped
    depends_on:
      zitadel-api:
        condition: service_healthy
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: "Host:auth.forumline.net,X-Forwarded-Proto:https"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.js http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - zitadel
    labels:
      - traefik.enable=true
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000
      - traefik.http.routers.zitadel-login.rule=PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login.priority=10
      - traefik.http.routers.zitadel-login.entrypoints=web
      - traefik.http.routers.zitadel-login.service=zitadel-login

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=auth_zitadel
      - --entrypoints.web.address=:80
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=WARN
      - --accesslog=true
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - zitadel

networks:
  zitadel:

volumes:
  zitadel-bootstrap:
