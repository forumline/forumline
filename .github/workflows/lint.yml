name: CI
on: [push, pull_request]
jobs:
  go-lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: forumline-identity-and-federation-api/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: forumline-identity-and-federation-api
  go-lint-forum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: example-forum-instances-and-shared-forum-server/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
          working-directory: example-forum-instances-and-shared-forum-server
  go-test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: forumline-identity-and-federation-api/go.sum
      - run: cd forumline-identity-and-federation-api && go test ./...
  go-test-forum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: example-forum-instances-and-shared-forum-server/go.sum
      - run: cd example-forum-instances-and-shared-forum-server && go test ./...
  ts-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm lint
  ts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm test
