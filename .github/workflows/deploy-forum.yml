name: Deploy Forumline Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'forum-demo/**'
      - 'packages/**'
      - 'package-lock.json'
      - 'Dockerfile.forum-demo'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly.yml
    with:
      working-directory: forum-demo
    secrets: inherit
