services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - /opt/forum/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  init-db:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/forum/repo/init-db/01-forum-tables.sql:/01-forum-tables.sql:ro
      - /opt/forum/repo/init-db/02-forum-triggers.sql:/02-forum-triggers.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "
        psql -h postgres -U postgres -d postgres -f /01-forum-tables.sql &&
        psql -h postgres -U postgres -d postgres -f /02-forum-triggers.sql &&
        echo 'DB init complete!'
      "

  forum:
    build:
      context: /opt/forum/repo
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      DATABASE_URL_DIRECT: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      FORUM_DOMAIN: "demo.forumline.net"
      VITE_SITE_URL: "https://demo.forumline.net"
      CORS_ALLOWED_ORIGINS: "https://demo.forumline.net,https://app.forumline.net"
      # Forumline identity (required)
      FORUMLINE_APP_URL: "${FORUMLINE_APP_URL}"
      ZITADEL_URL: "${ZITADEL_URL}"
      ZITADEL_CLIENT_ID: "${ZITADEL_CLIENT_ID}"
      ZITADEL_CLIENT_SECRET: "${ZITADEL_CLIENT_SECRET}"
      # LiveKit
      LIVEKIT_URL: "${LIVEKIT_URL}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      # R2 storage
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL}"
    ports:
      - "3000:3000"
