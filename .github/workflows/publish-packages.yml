name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'published-npm-packages/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish all packages
        run: |
          for pkg in protocol server-sdk central-services-client; do
            echo "=== Building and publishing $pkg ==="
            cd "published-npm-packages/$pkg"
            pnpm run build
            OUTPUT=$(pnpm publish --no-git-checks 2>&1) && echo "$OUTPUT" || {
              if echo "$OUTPUT" | grep -qi "cannot publish over"; then
                echo "Version already published, skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            }
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
