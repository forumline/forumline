name: Deploy Forumline Central Services

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/forumline-api/**'
      - 'services/forumline-web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'deploy/docker/Dockerfile.go-forumline'
      - 'deploy/compose/forumline/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Dagger
        run: >-
          dagger call deploy --source .
          --service forumline
          --ssh-key env:SSH_DEPLOY_KEY
          --cf-access-client-id env:CF_ACCESS_CLIENT_ID
          --cf-access-client-secret env:CF_ACCESS_CLIENT_SECRET
          --sops-age-key env:SOPS_AGE_KEY
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
