name: Deploy Forumline Demo

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'packages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    env:
      VERCEL_ORG_ID: team_v8Ej4FlhSEJtk4zdtTWiwTPE
      VERCEL_PROJECT_ID: prj_Q6NCsZIw3eRbYLQFMTkLon3wZ3Nk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Install workspace packages (for building from source)
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build monorepo packages from source
        run: |
          npm run --workspace=packages/protocol build
          npm run --workspace=packages/server-sdk build

      - name: Install demo dependencies
        run: npm ci
        working-directory: demo
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync built packages into demo node_modules
        run: |
          cp -r packages/protocol/dist/* demo/node_modules/@johnvondrashek/forumline-protocol/dist/
          cp packages/protocol/package.json demo/node_modules/@johnvondrashek/forumline-protocol/package.json
          cp -r packages/server-sdk/dist/* demo/node_modules/@johnvondrashek/forumline-server-sdk/dist/
          cp packages/server-sdk/package.json demo/node_modules/@johnvondrashek/forumline-server-sdk/package.json

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: demo

      - name: Build
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: demo

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: demo
