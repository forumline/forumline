services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  init-db:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init-db/01-forum-tables.sql:/01-forum-tables.sql:ro
      - ./init-db/02-forum-triggers.sql:/02-forum-triggers.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "
        psql -h postgres -U postgres -d postgres -f /01-forum-tables.sql &&
        psql -h postgres -U postgres -d postgres -f /02-forum-triggers.sql &&
        echo 'DB init complete!'
      "

  forum:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      FORUM_DOMAIN: "${FORUM_DOMAIN}"
      FORUM_NAME: "${FORUM_NAME:-My Forum}"
      VITE_SITE_URL: "${SITE_URL}"
      CORS_ALLOWED_ORIGINS: "${SITE_URL}"
      # Forumline identity (required)
      FORUMLINE_APP_URL: "${FORUMLINE_APP_URL}"
      ZITADEL_URL: "${ZITADEL_URL}"
      ZITADEL_CLIENT_ID: "${ZITADEL_CLIENT_ID}"
      ZITADEL_CLIENT_SECRET: "${ZITADEL_CLIENT_SECRET:-}"
      # LiveKit voice rooms (optional)
      LIVEKIT_URL: "${LIVEKIT_URL:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      # Cloudflare R2 avatar storage (optional)
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME:-}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:-}"
    ports:
      - "${HOST_PORT:-3000}:3000"

volumes:
  postgres-data:
