version: "2"
sql:
  - engine: "postgresql"
    queries: "sqlc/queries/"
    schema: "sqlc/schema.sql"
    gen:
      go:
        package: "sqlcdb"
        out: "sqlcdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          # TEXT → native string
          - db_type: "text"
            go_type: "string"
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          # TIMESTAMPTZ → native time.Time
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
