name: Deploy to Fly.io

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy forum-demo to Fly.io
        if: inputs.working-directory == 'forum-demo'
        run: >-
          flyctl deploy
          --config ${{ inputs.working-directory }}/fly.toml
          --dockerfile Dockerfile.${{ inputs.working-directory }}
          --build-arg GITHUB_PACKAGES_TOKEN=${{ secrets.GITHUB_TOKEN }}
          --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          --build-arg VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}
          --build-arg VITE_HUB_URL=${{ secrets.VITE_HUB_URL }}
          --build-arg VITE_HUB_SUPABASE_URL=${{ secrets.VITE_HUB_SUPABASE_URL }}
          --build-arg VITE_HUB_SUPABASE_ANON_KEY=${{ secrets.VITE_HUB_SUPABASE_ANON_KEY }}
          --build-arg VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
          --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Go forum to Fly.io
        if: inputs.working-directory == 'go-forum'
        run: >-
          flyctl deploy
          --config forum-demo/fly.toml
          --dockerfile Dockerfile.go-forum
          --build-arg GITHUB_PACKAGES_TOKEN=${{ secrets.GITHUB_TOKEN }}
          --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          --build-arg VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}
          --build-arg VITE_HUB_URL=${{ secrets.VITE_HUB_URL }}
          --build-arg VITE_HUB_SUPABASE_URL=${{ secrets.VITE_HUB_SUPABASE_URL }}
          --build-arg VITE_HUB_SUPABASE_ANON_KEY=${{ secrets.VITE_HUB_SUPABASE_ANON_KEY }}
          --build-arg VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
          --build-arg VITE_USE_API_PROVIDER=true
          --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Go hub to Fly.io
        if: inputs.working-directory == 'go-hub'
        run: >-
          flyctl deploy
          --config go-services/fly.toml
          --dockerfile Dockerfile.go-hub
          --build-arg GITHUB_PACKAGES_TOKEN=${{ secrets.GITHUB_TOKEN }}
          --build-arg VITE_HUB_SUPABASE_URL=${{ secrets.VITE_HUB_SUPABASE_URL }}
          --build-arg VITE_HUB_SUPABASE_ANON_KEY=${{ secrets.VITE_HUB_SUPABASE_ANON_KEY }}
          --build-arg VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
