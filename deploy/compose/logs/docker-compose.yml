services:
  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    restart: unless-stopped
    volumes:
      - victoria-logs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=30d
      - -httpListenAddr=:9428
      - -syslog.listenAddr.tcp=:1514
    ports:
      - "9428:9428"
      - "1514:1514"

volumes:
  victoria-logs-data:
