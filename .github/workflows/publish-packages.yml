name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: npm

      - name: Install workspace dependencies
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish all packages
        run: |
          for pkg in protocol server-sdk central-services-client react; do
            echo "=== Building and publishing $pkg ==="
            cd "packages/$pkg"
            npm run build
            OUTPUT=$(npm publish 2>&1) && echo "$OUTPUT" || {
              if echo "$OUTPUT" | grep -qi "cannot publish over"; then
                echo "Version already published, skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            }
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
