name: Terraform Plan

on:
  pull_request:
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run OpenTofu plan
        uses: dagger/dagger-for-github@v7
        id: plan
        with:
          module: ci
          verb: call
          args: >-
            terraform-plan
            --source .
            --r2-access-key-id env:AWS_ACCESS_KEY_ID
            --r2-secret-access-key env:AWS_SECRET_ACCESS_KEY
            --cloudflare-api-token env:TF_VAR_CLOUDFLARE_API_TOKEN
            --state-encryption-passphrase env:TF_STATE_ENCRYPTION_PASSPHRASE
          version: "0.20.1"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_CLOUDFLARE_API_TOKEN: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_STATE_ENCRYPTION_PASSPHRASE: ${{ secrets.TF_STATE_ENCRYPTION_PASSPHRASE }}

      # PR comment stays in GitHub Actions — this is the GitHub-specific part
      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`.substring(0, 60000);
            const body = `### OpenTofu Plan\n\n\`\`\`\n${plan}\n\`\`\`\n\n*Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### OpenTofu Plan'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
