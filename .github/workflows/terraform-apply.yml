name: Terraform Apply (one-time)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenTofu
        run: |
          if ! command -v tofu &>/dev/null; then
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo bash -s -- --install-method standalone --opentofu-version 1.11.5
          fi

      - name: Run OpenTofu apply
        working-directory: deploy/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_state_encryption_passphrase: ${{ secrets.TF_STATE_ENCRYPTION_PASSPHRASE }}
        run: |
          tofu init
          tofu plan -var-file=prod.tfvars -no-color
          echo "---"
          echo "Applying..."
          tofu apply -var-file=prod.tfvars -auto-approve -no-color
