services:
  db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-auth-schema.sql:/docker-entrypoint-initdb.d/00-auth-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  gotrue:
    image: supabase/gotrue:v2.186.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9999:8080"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "8080"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres?sslmode=disable&search_path=auth"
      GOTRUE_SITE_URL: "http://localhost:3001"
      API_EXTERNAL_URL: "http://localhost:9999"
      GOTRUE_JWT_SECRET: "super-secret-jwt-token-for-local-dev-min-32-chars"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_AUD: "authenticated"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_JWT_ADMIN_ROLES: "service_role"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      # For local dev, use Mailpit to catch emails:
      #   Add mailpit service: image: axllent/mailpit, ports: ["8025:8025", "1025:1025"]
      #   Set GOTRUE_SMTP_HOST=mailpit, GOTRUE_SMTP_PORT=1025
      # Production uses Resend (smtp.resend.com:465)
      GOTRUE_SMTP_ADMIN_EMAIL: "noreply@forumline.net"

  init-db:
    image: postgres:17-alpine
    depends_on:
      gotrue:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres
    entrypoint: ["sh", "-c", "psql -h db -U postgres -d postgres -f /init.sql && echo 'DB seeded!'"]

volumes:
  pgdata:
