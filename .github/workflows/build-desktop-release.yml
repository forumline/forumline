name: Desktop Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: false
        type: string
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: native-applications/macos

      - name: Build macOS app
        run: |
          xcodebuild build \
            -project Forumline.xcodeproj \
            -scheme Forumline \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath build
        working-directory: native-applications/macos

      - name: Create DMG
        run: |
          APP_PATH="native-applications/macos/build/Build/Products/Release/Forumline.app"
          npx create-dmg "$APP_PATH" --overwrite --dmg-title "Forumline" --no-code-sign || true

          DMG_FILE=$(ls -1 Forumline*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            FINAL_NAME="Forumline-${{ steps.version.outputs.version }}.dmg"
            mv "$DMG_FILE" "$FINAL_NAME"
            echo "Created: $FINAL_NAME"
          else
            echo "::error::DMG was not created"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-dmg
          path: Forumline-${{ steps.version.outputs.version }}.dmg

  release:
    needs: build-macos
    if: inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ needs.build-macos.outputs.version }}
          name: Forumline Desktop v${{ needs.build-macos.outputs.version }}
          body: |
            ## Forumline Desktop v${{ needs.build-macos.outputs.version }}

            ### Install
            Download `Forumline-${{ needs.build-macos.outputs.version }}.dmg`, open it, and drag Forumline to Applications.
          files: artifacts/release-macos-dmg/*
          draft: false
          prerelease: false
