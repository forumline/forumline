name: Deploy Hosted Forum Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'example-forum-instances-and-shared-forum-server/**'
      - 'Dockerfile.go-hosted'
      - '.github/workflows/deploy-hosted.yml'
      - 'production-docker-compose-configs/hosted/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sops and age
        run: |
          curl -fsSL "https://dl.filippo.io/age/v1.2.0?for=linux/amd64" -o /tmp/age.tar.gz
          tar -xzf /tmp/age.tar.gz -C /tmp && sudo mv /tmp/age/age /usr/local/bin/
          curl -fsSL "https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64" -o /tmp/sops
          chmod +x /tmp/sops && sudo mv /tmp/sops /usr/local/bin/sops

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops -d --input-type dotenv --output-type dotenv production-docker-compose-configs/hosted/.env.enc > /tmp/hosted.env

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FORUM_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<EOF
          Host hosted-prod
            HostName hosted-ssh.forumline.net
            User root
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy
        run: |
          scp /tmp/hosted.env hosted-prod:/opt/hosted/.env
          scp production-docker-compose-configs/hosted/docker-compose.yml hosted-prod:/opt/hosted/docker-compose.yml
          ssh hosted-prod "cd /opt/hosted/repo && git fetch origin main && git reset --hard origin/main && cd /opt/hosted && docker compose up -d --build hosted && docker compose ps"
