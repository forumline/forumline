# Local Zitadel instance — mirrors auth-prod LXC (CT 106)
# Run independently: cd services/zitadel && docker compose up -d
# Accessible at http://localhost:8080
# Admin login: admin@localhost / LocalDev123!
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: zitadel-postgres
      POSTGRES_DB: zitadel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d zitadel -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.11.0
    command: start-from-init --masterkey "local-dev-masterkey-32-chars-ok!"
    user: "0"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ZITADEL_PORT: "8080"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel-postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "8080"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      # Admin user
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "LocalDev123!"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      # Service account for API access (PAT written to bootstrap volume)
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: forumline-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: "Forumline Service Account"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/sa.pat
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw

volumes:
  pgdata:
  zitadel-bootstrap:
