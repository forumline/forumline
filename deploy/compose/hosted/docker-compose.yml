services:
  postgres:
    image: citusdata/citus:13.0
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - /opt/hosted/postgres-data:/var/lib/postgresql/data
      - /opt/hosted/repo/services/hosted/init-platform.sql:/docker-entrypoint-initdb.d/00-init-platform.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  hosted:
    build:
      context: /opt/hosted/repo
      dockerfile: deploy/docker/Dockerfile.go-hosted
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      DATABASE_URL_DIRECT: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      FORUMLINE_APP_URL: "${FORUMLINE_APP_URL}"
      ZITADEL_URL: "${ZITADEL_URL}"
      ZITADEL_CLIENT_ID: "${ZITADEL_CLIENT_ID}"
      ZITADEL_SERVICE_USER_PAT: "${ZITADEL_SERVICE_USER_PAT}"
      PLATFORM_BASE_DOMAIN: "forumline.net"
      CORS_ALLOWED_ORIGINS: "https://forumline.net,https://*.forumline.net"
      # LiveKit (shared across all tenants)
      LIVEKIT_URL: "${LIVEKIT_URL}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      # R2 storage (shared across all tenants)
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL}"
    ports:
      - "3000:3000"
