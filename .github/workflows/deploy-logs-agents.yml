name: Deploy Logs Agents

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/logs-agent/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to all hosts
        run: |
          for host in forum-prod forumline-prod website-prod hosted-prod; do
            echo "=== Deploying to $host ==="
            ssh "$host" "mkdir -p /opt/logs-agent"
            sed "s/\${LOGS_HOST_LABEL}/$host/" deploy/compose/logs-agent/vector.toml > "/tmp/vector-$host.toml"
            scp deploy/compose/logs-agent/docker-compose.yml "$host:/opt/logs-agent/docker-compose.yml"
            scp "/tmp/vector-$host.toml" "$host:/opt/logs-agent/vector.toml"
            ssh "$host" "cd /opt/logs-agent && docker compose pull && docker compose up -d --force-recreate --remove-orphans"
            rm -f "/tmp/vector-$host.toml"
          done
