name: Update Forum Screenshots

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Update via Dagger
        run: >-
          dagger call update-screenshots --source .
          --forumline-api-url env:FORUMLINE_API_URL
          --forumline-service-key env:FORUMLINE_SERVICE_KEY
          --r2-account-id env:R2_ACCOUNT_ID
          --r2-access-key-id env:R2_ACCESS_KEY_ID
          --r2-secret-access-key env:R2_SECRET_ACCESS_KEY
          --r2-bucket-name env:R2_BUCKET_NAME
          --r2-public-url env:R2_PUBLIC_URL
        env:
          FORUMLINE_API_URL: ${{ secrets.FORUMLINE_API_URL }}
          FORUMLINE_SERVICE_KEY: ${{ secrets.FORUMLINE_SERVICE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
