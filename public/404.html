<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Forum Chat Voice</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Converts 404s to proper SPA routes
      const path = window.location.pathname;
      const repo = '/forum-chat-voice';
      if (path.startsWith(repo)) {
        const route = path.slice(repo.length) || '/';
        sessionStorage.setItem('redirect', route + window.location.search);
        window.location.replace(repo + '/');
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
