name: Deploy to Fly.io

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Go forum to Fly.io
        if: inputs.working-directory == 'go-forum'
        run: >-
          flyctl deploy
          --config fly.toml
          --dockerfile Dockerfile.go-forum
          --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy Go hub to Fly.io
        if: inputs.working-directory == 'go-hub'
        run: >-
          flyctl deploy
          --config go-services/fly.toml
          --dockerfile Dockerfile.go-hub
          --build-arg GITHUB_PACKAGES_TOKEN=${{ secrets.GITHUB_TOKEN }}
          --build-arg VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
