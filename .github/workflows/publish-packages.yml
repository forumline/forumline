name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'

jobs:
  publish:
    runs-on: self-hosted
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish via Dagger
        run: >-
          dagger call publish-packages --source .
          --github-token env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
