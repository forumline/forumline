version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /example-forum-instances-and-shared-forum-server/forum-a
    schedule:
      interval: weekly
    groups:
      forum-a-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /forumline-identity-and-federation-web
    schedule:
      interval: weekly
    groups:
      forumline-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
