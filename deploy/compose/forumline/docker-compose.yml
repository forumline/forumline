services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: postgres
    volumes:
      - /opt/forumline/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  init-db:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/forumline/init-db/01-forumline-tables.sql:/01-forumline-tables.sql:ro
    env_file: .env
    entrypoint: >
      sh -c "
        PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U postgres -d postgres -f /01-forumline-tables.sql &&
        echo Forumline DB init complete!
      "

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:4222:4222"

  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      hub:
        condition: service_healthy
      comm:
        condition: service_healthy
    restart: unless-stopped

  hub:
    build:
      context: /opt/forumline/repo
      dockerfile: deploy/docker/Dockerfile.go-hub
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file: .env
    environment:
      VALKEY_URL: "valkey:6379"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  comm:
    build:
      context: /opt/forumline/repo
      dockerfile: deploy/docker/Dockerfile.go-comm
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: "3001"
      VALKEY_URL: "valkey:6379"
      NATS_URL: "nats://nats:4222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  push:
    build:
      context: /opt/forumline/repo
      dockerfile: deploy/docker/Dockerfile.go-push
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file: .env
    environment:
      NATS_URL: "nats://nats:4222"
    restart: unless-stopped
