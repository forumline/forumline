name: Publish Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: dagger/dagger-for-github@v7
        with:
          module: ci
          verb: call
          args: >-
            publish-packages
            --source .
            --github-token env:GITHUB_TOKEN
          version: "0.20.1"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
