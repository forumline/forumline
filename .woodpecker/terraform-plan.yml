when:
  - event: pull_request
    path:
      include:
        - "deploy/terraform/**"

steps:
  - name: plan
    image: bash
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: tf_state_r2_access_key_id
      AWS_SECRET_ACCESS_KEY:
        from_secret: tf_state_r2_secret_access_key
      TF_VAR_cloudflare_api_token:
        from_secret: tf_cloudflare_api_token
      TF_VAR_state_encryption_passphrase:
        from_secret: tf_state_encryption_passphrase
    commands:
      - cd deploy/terraform
      - tofu init
      - tofu plan -var-file=prod.tfvars -no-color 2>&1 | tee /tmp/tofu-plan.txt
