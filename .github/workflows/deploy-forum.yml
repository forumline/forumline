name: Deploy Forumline Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go-services/**'
      - 'forum-demo/src/**'
      - 'forum-demo/index.html'
      - 'forum-demo/vite.config.ts'
      - 'forum-demo/tsconfig.json'
      - 'forum-demo/package.json'
      - 'packages/**'
      - 'package-lock.json'
      - 'Dockerfile.go-forum'
      - '.github/workflows/deploy-fly.yml'
      - '.github/workflows/deploy-forum.yml'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly.yml
    with:
      working-directory: go-forum
    secrets: inherit
