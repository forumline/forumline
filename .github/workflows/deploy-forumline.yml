name: Deploy Forumline App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/forumline-api/**'
      - 'services/forumline-hub/**'
      - 'services/forumline-comm/**'
      - 'services/forumline-push/**'
      - 'services/forumline-web/**'
      - 'packages/frontend/**'
      - 'packages/backend/**'
      - 'pnpm-lock.yaml'
      - 'deploy/docker/Dockerfile.go-forumline'
      - 'deploy/docker/Dockerfile.go-hub'
      - 'deploy/docker/Dockerfile.go-comm'
      - 'deploy/docker/Dockerfile.go-push'
      - 'deploy/compose/forumline/**'
      - 'secrets.kdbx'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Deploy
        run: ci/deploy.sh forumline
        env:
          KEEPASS_PASSWORD: ${{ secrets.KEEPASS_PASSWORD }}

      - name: Smoke test critical paths
        if: success()
        run: pnpm install --ignore-scripts && pnpm exec playwright install chromium && pnpm exec playwright test --config tests/playwright.config.ts --project=smoke --grep "critical paths"
