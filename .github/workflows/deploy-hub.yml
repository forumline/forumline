name: Deploy Forumline Central Services

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'central-services/**'
      - 'packages/**'
      - 'package-lock.json'
      - 'Dockerfile.central-services'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly.yml
    with:
      working-directory: central-services
    secrets: inherit
