version: "2"
sql:
  - engine: "postgresql"
    queries: "sqlc/queries/"
    schema: "sqlc/schema.sql"
    gen:
      go:
        package: "sqlcdb"
        out: "sqlcdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # All UUIDs → Go string (hosted uses string IDs everywhere)
          - db_type: "pg_catalog.uuid"
            go_type: "string"
