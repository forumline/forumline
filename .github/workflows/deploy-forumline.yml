name: Deploy Forumline Central Services

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/forumline-api/**'
      - 'services/forumline-web/src/**'
      - 'services/forumline-web/index.html'
      - 'services/forumline-web/vite.config.ts'
      - 'services/forumline-web/tsconfig.json'
      - 'services/forumline-web/package.json'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'deploy/docker/Dockerfile.go-forumline'
      - 'deploy/compose/forumline/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dagger/dagger-for-github@v7
        with:
          module: ci
          verb: call
          args: >-
            deploy
            --source .
            --service forumline
            --ssh-key env:FORUM_SSH_KEY
            --cf-access-client-id env:CF_ACCESS_CLIENT_ID
            --cf-access-client-secret env:CF_ACCESS_CLIENT_SECRET
            --sops-age-key env:SOPS_AGE_KEY
          version: "0.20.1"
        env:
          FORUM_SSH_KEY: ${{ secrets.FORUM_SSH_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
