version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /examples/forum-a
    schedule:
      interval: weekly
    groups:
      forum-a-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /central-services
    schedule:
      interval: weekly
    groups:
      forumline-dependencies:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /native-app/src-tauri
    schedule:
      interval: weekly
    groups:
      cargo-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
