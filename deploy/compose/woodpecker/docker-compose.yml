services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3
    container_name: woodpecker-server
    restart: unless-stopped
    ports:
      - "8000:8000"  # Web UI + API + webhooks
      - "9000:9000"  # gRPC (agent communication)
    volumes:
      - woodpecker-data:/var/lib/woodpecker/
    env_file: .env

volumes:
  woodpecker-data:
