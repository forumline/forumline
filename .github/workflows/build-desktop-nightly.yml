name: Nightly Builds

on:
  schedule:
    # Every day at 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if no changes'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      date: ${{ steps.check.outputs.date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check
        run: |
          echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force }}" == "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Forced build"
            exit 0
          fi

          # Check if nightly tag exists
          if git rev-parse nightly-latest >/dev/null 2>&1; then
            CHANGES=$(git log nightly-latest..HEAD --oneline)
            if [ -z "$CHANGES" ]; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No changes since last nightly"
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "Changes found:"
              echo "$CHANGES"
            fi
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous nightly tag found, building"
          fi

  build-desktop:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-and-mobile-tauri-apps/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-and-mobile-tauri-apps/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build --bundles app
        working-directory: desktop-and-mobile-tauri-apps

      - name: Create DMG
        run: |
          APP_PATH="desktop-and-mobile-tauri-apps/target/release/bundle/macos/Forumline.app"
          npx create-dmg "$APP_PATH" --overwrite --dmg-title "Forumline Nightly" --no-code-sign || true

          DMG_FILE=$(ls -1 Forumline*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            mv "$DMG_FILE" Forumline-nightly.dmg
            echo "Created: Forumline-nightly.dmg"
          else
            echo "::error::DMG was not created"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: Forumline-nightly.dmg

  build-android:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-and-mobile-tauri-apps/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('desktop-and-mobile-tauri-apps/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Initialize Android project
        run: cargo tauri android init
        working-directory: desktop-and-mobile-tauri-apps

      - name: Build Android APK
        run: cargo tauri android build
        working-directory: desktop-and-mobile-tauri-apps
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Collect APK
        run: |
          APK=$(find desktop-and-mobile-tauri-apps/gen/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" Forumline-nightly.apk
            echo "Found APK: $APK"
          else
            echo "::error::APK not found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Forumline-nightly.apk

  build-ios:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-and-mobile-tauri-apps/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('desktop-and-mobile-tauri-apps/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Initialize iOS project
        run: cargo tauri ios init
        working-directory: desktop-and-mobile-tauri-apps

      - name: Disable code signing in Xcode project
        run: |
          PBXPROJ="desktop-and-mobile-tauri-apps/gen/apple/forumline-demo.xcodeproj/project.pbxproj"
          # Set CODE_SIGNING_ALLOWED = NO for all build configurations
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "-";/' "$PBXPROJ"
          sed -i '' '/buildSettings = {/a\
            CODE_SIGNING_ALLOWED = NO;\
            CODE_SIGNING_REQUIRED = NO;
          ' "$PBXPROJ"

      - name: Build Rust library for iOS simulator
        run: cargo build --release --target aarch64-apple-ios-sim --lib
        working-directory: desktop-and-mobile-tauri-apps

      - name: Build iOS app (simulator, no export)
        run: |
          # Tauri's Xcode script phase expects this file; the app loads from a remote URL
          # so the address doesn't matter, but the file must exist
          echo "https://app.forumline.net" > "$TMPDIR/net.forumline.app-server-addr"

          xcodebuild build \
            -project gen/apple/forumline-demo.xcodeproj \
            -scheme forumline-demo_iOS \
            -configuration release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        working-directory: desktop-and-mobile-tauri-apps

      - name: Package iOS build
        run: |
          APP_DIR=$(find desktop-and-mobile-tauri-apps/build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_DIR" ]; then
            cd "$(dirname "$APP_DIR")"
            zip -r "$GITHUB_WORKSPACE/Forumline-nightly-ios-simulator.zip" "$(basename "$APP_DIR")"
            echo "Packaged: $(basename "$APP_DIR")"
          else
            echo "::error::iOS .app not found"
            exit 1
          fi

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator
          path: Forumline-nightly-ios-simulator.zip

  release:
    needs: [check-changes, build-desktop, build-android, build-ios]
    if: always() && needs.check-changes.outputs.has_changes == 'true' && (needs.build-desktop.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List available artifacts
        run: find artifacts -type f | sort

      - name: Build release body
        id: body
        run: |
          BODY="## Nightly Build — ${{ needs.check-changes.outputs.date }}"
          BODY="$BODY

          Built from commit \`${{ needs.check-changes.outputs.short_sha }}\` on \`main\`.

          **These are development builds and may be unstable.**

          ### Downloads"

          if [ -f artifacts/desktop-dmg/Forumline-nightly.dmg ]; then
            BODY="$BODY
          - **macOS**: \`Forumline-nightly.dmg\` — Open and drag to Applications"
          fi
          if [ -f artifacts/android-apk/Forumline-nightly.apk ]; then
            BODY="$BODY
          - **Android**: \`Forumline-nightly.apk\` — Enable \"Install from unknown sources\" to install"
          fi
          if [ -f artifacts/ios-simulator/Forumline-nightly-ios-simulator.zip ]; then
            BODY="$BODY
          - **iOS**: \`Forumline-nightly-ios-simulator.zip\` — Simulator build only (no code signing)"
          fi

          BODY="$BODY

          ---
          *This release is automatically replaced by the next nightly build.*"

          # Write to file to preserve newlines
          echo "$BODY" > release-body.md

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nightly-latest tag
        run: |
          git tag -f nightly-latest
          git push -f origin nightly-latest

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/desktop-dmg/Forumline-nightly.dmg release-files/ 2>/dev/null || true
          cp artifacts/android-apk/Forumline-nightly.apk release-files/ 2>/dev/null || true
          cp artifacts/ios-simulator/Forumline-nightly-ios-simulator.zip release-files/ 2>/dev/null || true
          ls -la release-files/

      - name: Create nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ needs.check-changes.outputs.date }})"
          body_path: release-body.md
          files: release-files/*
          draft: false
          prerelease: true
