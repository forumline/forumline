name: Forumline
options:
  bundleIdPrefix: net.forumline
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.4"

targets:
  Forumline:
    type: application
    platform: macOS
    sources:
      - Forumline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.forumline.app.macos
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Forumline/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
    entitlements:
      path: Forumline/Forumline.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
