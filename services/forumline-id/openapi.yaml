openapi: 3.0.3
info:
  title: Forumline Identity Service
  version: 1.0.0
  description: |
    "Sign in with Forumline" OAuth proxy service running at id.forumline.net.

    This lightweight identity service wraps Zitadel so that forums (hosted and
    self-hosted) never talk to Zitadel directly. It presents a simple OAuth-style
    authorization code flow:

    1. Forum redirects user to `GET /authorize`
    2. User authenticates with Zitadel (transparent to the user)
    3. Callback redirects back to forum with an auth code
    4. Forum exchanges the code server-to-server via `POST /token`

    For in-app (iframe) authentication, forums can also validate a Forumline JWT
    directly via `GET /userinfo`, and fetch signing keys from `GET /.well-known/jwks`.
  contact:
    name: Forumline
    url: https://forumline.net
  license:
    name: Proprietary
    url: https://forumline.net

servers:
  - url: https://id.forumline.net
    description: Production

tags:
  - name: OAuth Flow
    description: Authorization code flow endpoints used by forums to authenticate users.
  - name: Token Validation
    description: Endpoints for validating JWTs and retrieving user identity from bearer tokens.
  - name: Discovery
    description: Well-known endpoints for key discovery and service health.

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns a simple status object. Used by uptime monitors and load balancers.
      tags: [Discovery]
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /authorize:
    get:
      operationId: authorize
      summary: Start the "Sign in with Forumline" flow
      description: |
        Forums redirect users here to begin authentication. The service validates
        the `redirect_uri`, stores the forum context in an HTTP-only cookie, and
        redirects the user to Zitadel for login.

        Allowed redirect URIs: `*.forumline.net`, `forumline.net`, `localhost`,
        and `127.0.0.1` (development).
      tags: [OAuth Flow]
      security: []
      parameters:
        - name: redirect_uri
          in: query
          required: true
          description: |
            The forum's callback URL where the user will be redirected after login.
            Must be on a `*.forumline.net` domain or localhost.
          schema:
            type: string
            format: uri
            example: https://testforum.forumline.net/api/forumline/auth/callback
        - name: state
          in: query
          required: false
          description: Opaque CSRF state value from the forum. Returned unmodified in the callback redirect.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to Zitadel for authentication.
          headers:
            Location:
              description: Zitadel OIDC authorization URL.
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: |
                Sets `forumline_id_ctx` (forum redirect_uri + state) and
                `forumline_id_state` (OIDC state) as HttpOnly, Secure, SameSite=Lax
                cookies with a 10-minute TTL.
              schema:
                type: string
        "400":
          description: Missing or invalid `redirect_uri`, or redirect URI not on an allowed domain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value:
                    error: redirect_uri is required
                invalid:
                  value:
                    error: invalid redirect_uri
                disallowed:
                  value:
                    error: "redirect_uri must be a *.forumline.net domain"

  /callback:
    get:
      operationId: callback
      summary: Zitadel OIDC callback
      description: |
        Receives the redirect from Zitadel after the user authenticates. Validates
        the OIDC state, exchanges the Zitadel authorization code for tokens,
        extracts user identity from the ID token, generates a short-lived (60s)
        single-use auth code, and redirects back to the forum's callback URL with
        `?code=<auth_code>&state=<forum_state>`.

        This endpoint is not called directly by forums -- it is the OIDC redirect
        URI registered with Zitadel.
      tags: [OAuth Flow]
      security: []
      parameters:
        - name: code
          in: query
          required: true
          description: Zitadel OIDC authorization code.
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: OIDC state value, must match the `forumline_id_state` cookie.
          schema:
            type: string
      responses:
        "302":
          description: |
            Redirect to the forum's callback URL with query parameters:
            - `code` -- short-lived Forumline auth code (hex, 64 chars, expires in 60s)
            - `state` -- the original forum state value (if provided during /authorize)
          headers:
            Location:
              description: Forum callback URL with `code` and `state` query parameters.
              schema:
                type: string
                format: uri
        "400":
          description: State mismatch, missing forum context cookie, or invalid forum context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                stateMismatch:
                  value:
                    error: state mismatch
                missingContext:
                  value:
                    error: missing forum context
                invalidContext:
                  value:
                    error: invalid forum context
        "500":
          description: Zitadel code exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: authentication failed

  /token:
    post:
      operationId: tokenExchange
      summary: Exchange auth code for user info
      description: |
        Server-to-server endpoint. After receiving a Forumline auth code via the
        callback redirect, the forum backend calls this endpoint to exchange the
        code for user identity information.

        Auth codes are single-use and expire after 60 seconds. The `redirect_uri`
        must exactly match the one used during the `/authorize` request. If the
        code is invalid, expired, or the redirect_uri doesn't match, the code is
        immediately invalidated (per RFC 6749 section 4.1.2).
      tags: [OAuth Flow]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: User identity returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "400":
          description: Invalid request body or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error: invalid request body
                missingFields:
                  value:
                    error: code and redirect_uri are required
        "401":
          description: Auth code is invalid, expired, or redirect_uri mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: invalid or expired code

  /userinfo:
    get:
      operationId: userInfo
      summary: Validate JWT and return user profile
      description: |
        Validates a Forumline (Zitadel) access token by proxying it to Zitadel's
        userinfo endpoint, then returns a normalized user profile. Used by forums
        for the in-app (iframe) authentication flow where a JWT is passed via
        postMessage.

        The token can be provided as a Bearer token in the Authorization header
        or as an `access_token` query parameter.
      tags: [Token Validation]
      security:
        - bearerAuth: []
      parameters:
        - name: access_token
          in: query
          required: false
          description: Alternative to the Authorization header. Provide the access token as a query parameter.
          schema:
            type: string
      responses:
        "200":
          description: Token is valid. Returns normalized user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoPublic"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value:
                    error: missing bearer token
                invalid:
                  value:
                    error: invalid or expired token
        "502":
          description: Zitadel userinfo endpoint is unreachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: identity provider unreachable

  /.well-known/jwks:
    get:
      operationId: jwks
      summary: JSON Web Key Set
      description: |
        Proxies Zitadel's JWKS endpoint so forums can validate Forumline JWTs
        without knowing Zitadel exists. Response is cached for 5 minutes.
      tags: [Discovery]
      security: []
      responses:
        "200":
          description: JWKS document containing the public signing keys.
          headers:
            Cache-Control:
              description: Caching directive. Set to `public, max-age=300` (5 minutes).
              schema:
                type: string
                example: "public, max-age=300"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"
        "502":
          description: Zitadel JWKS endpoint is unreachable or returned an unreadable response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unreachable:
                  value:
                    error: identity provider unreachable
                unreadable:
                  value:
                    error: failed to read JWKS

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Forumline (Zitadel) access token.

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: invalid request body

    TokenRequest:
      type: object
      required: [code, redirect_uri]
      properties:
        code:
          type: string
          description: The single-use auth code received from the callback redirect.
          example: a1b2c3d4e5f6...
        redirect_uri:
          type: string
          format: uri
          description: Must exactly match the redirect_uri used in the original /authorize request.
          example: https://testforum.forumline.net/api/forumline/auth/callback

    UserInfo:
      type: object
      description: |
        Full user identity payload returned from the token exchange. Includes
        the Zitadel access token so forums can make further API calls on behalf
        of the user.
      required: [forumline_id, username, display_name, avatar_url, access_token]
      properties:
        forumline_id:
          type: string
          description: Stable user identifier (Zitadel subject ID).
          example: "364411396760123456"
        username:
          type: string
          description: User's preferred username, falling back to email.
          example: johnvondrashek
        display_name:
          type: string
          description: User's display name (given + family name), falling back to username.
          example: John Vondrashek
        avatar_url:
          type: string
          description: URL to the user's profile picture. May be empty if none is set.
          example: https://auth.forumline.net/assets/v1/...
        access_token:
          type: string
          description: Zitadel access token for making API calls on behalf of the user.

    UserInfoPublic:
      type: object
      description: |
        User identity payload returned from the /userinfo endpoint. Does not
        include the access token (the caller already has it).
      required: [forumline_id, username, display_name, avatar_url]
      properties:
        forumline_id:
          type: string
          description: Stable user identifier (Zitadel subject ID).
          example: "364411396760123456"
        username:
          type: string
          description: User's preferred username, falling back to email.
          example: johnvondrashek
        display_name:
          type: string
          description: User's display name, falling back to username.
          example: John Vondrashek
        avatar_url:
          type: string
          description: URL to the user's profile picture. May be empty if none is set.
          example: https://auth.forumline.net/assets/v1/...

    JWKS:
      type: object
      description: JSON Web Key Set per RFC 7517.
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JWK"

    JWK:
      type: object
      description: A single JSON Web Key per RFC 7517.
      required: [kty, use, kid]
      properties:
        kty:
          type: string
          description: Key type (e.g. RSA, EC).
          example: RSA
        use:
          type: string
          description: Key usage (sig for signing).
          example: sig
        kid:
          type: string
          description: Key ID.
        alg:
          type: string
          description: Algorithm (e.g. RS256).
          example: RS256
        n:
          type: string
          description: RSA modulus (base64url-encoded).
        e:
          type: string
          description: RSA exponent (base64url-encoded).
          example: AQAB
