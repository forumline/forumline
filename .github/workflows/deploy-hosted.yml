name: Deploy Hosted Forum Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/hosted/**'
      - 'packages/backend/**'
      - 'packages/forum/**'
      - 'deploy/docker/Dockerfile.go-hosted'
      - 'deploy/compose/hosted/**'
      - 'secrets.kdbx'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Deploy
        run: ci/deploy.sh hosted
        env:
          KEEPASS_PASSWORD: ${{ secrets.KEEPASS_PASSWORD }}

      - name: Smoke test critical paths
        if: success()
        run: pnpm install --ignore-scripts && pnpm exec playwright install chromium && pnpm exec playwright test --config tests/playwright.config.ts --project=smoke --grep "critical paths"
