version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /forum-demo
    schedule:
      interval: weekly
    groups:
      forum-demo-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /central-services
    schedule:
      interval: weekly
    groups:
      hub-dependencies:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /native-app/src-tauri
    schedule:
      interval: weekly
    groups:
      cargo-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
