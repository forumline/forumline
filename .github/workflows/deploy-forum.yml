name: Deploy Forumline Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go-services/**'
      - 'forum-vanilla/src/**'
      - 'forum-vanilla/index.html'
      - 'forum-vanilla/vite.config.js'
      - 'forum-vanilla/package.json'
      - 'package-lock.json'
      - 'Dockerfile.go-forum'
      - '.github/workflows/deploy-fly.yml'
      - '.github/workflows/deploy-forum.yml'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly.yml
    with:
      working-directory: go-forum
    secrets: inherit
