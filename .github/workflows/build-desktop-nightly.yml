name: Nightly Builds

on:
  schedule:
    # Every day at 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if no changes'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      date: ${{ steps.check.outputs.date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last nightly
        id: check
        run: |
          echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force }}" == "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Forced build"
            exit 0
          fi

          # Check if nightly tag exists
          if git rev-parse nightly-latest >/dev/null 2>&1; then
            CHANGES=$(git log nightly-latest..HEAD --oneline)
            if [ -z "$CHANGES" ]; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No changes since last nightly"
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "Changes found:"
              echo "$CHANGES"
            fi
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous nightly tag found, building"
          fi

  build-macos:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: native-applications/macos

      - name: Build macOS app
        run: |
          xcodebuild build \
            -project Forumline.xcodeproj \
            -scheme Forumline \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath build
        working-directory: native-applications/macos

      - name: Create DMG
        run: |
          APP_PATH="native-applications/macos/build/Build/Products/Release/Forumline.app"
          npx create-dmg "$APP_PATH" --overwrite --dmg-title "Forumline Nightly" --no-code-sign || true

          DMG_FILE=$(ls -1 Forumline*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            mv "$DMG_FILE" Forumline-nightly.dmg
            echo "Created: Forumline-nightly.dmg"
          else
            echo "::error::DMG was not created"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: Forumline-nightly.dmg

  build-linux:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Build Linux app
        run: make
        working-directory: native-applications/linux

      - name: Package binary
        run: |
          mkdir -p Forumline-linux
          cp native-applications/linux/forumline Forumline-linux/
          cp native-applications/linux/net.forumline.app.desktop Forumline-linux/
          tar czf Forumline-nightly-linux.tar.gz Forumline-linux/

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: Forumline-nightly-linux.tar.gz

  build-windows:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Windows app
        run: dotnet publish -c Release -o publish
        working-directory: native-applications/windows

      - name: Package exe
        run: |
          Compress-Archive -Path native-applications/windows\publish\* -DestinationPath Forumline-nightly-windows.zip
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: Forumline-nightly-windows.zip

  build-android:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('native-applications/android/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK
        run: ./gradlew assembleRelease
        working-directory: native-applications/android

      - name: Collect APK
        run: |
          APK=$(find native-applications/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" Forumline-nightly.apk
            echo "Found APK: $APK"
          else
            echo "::error::APK not found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Forumline-nightly.apk

  build-ios:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: native-applications/ios

      - name: Build iOS app for simulator
        run: |
          xcodebuild build \
            -project Forumline.xcodeproj \
            -scheme Forumline \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath build
        working-directory: native-applications/ios

      - name: Package simulator build
        run: |
          APP_DIR=$(find native-applications/ios/build/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            cd "$(dirname "$APP_DIR")"
            zip -r "$GITHUB_WORKSPACE/Forumline-nightly-ios-simulator.zip" "$(basename "$APP_DIR")"
            echo "Packaged: $(basename "$APP_DIR")"
          else
            echo "::error::iOS .app not found"
            exit 1
          fi

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator
          path: Forumline-nightly-ios-simulator.zip

  release:
    needs: [check-changes, build-macos, build-windows, build-linux, build-android, build-ios]
    if: always() && needs.check-changes.outputs.has_changes == 'true' && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success' || needs.build-linux.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List available artifacts
        run: find artifacts -type f | sort

      - name: Build release body
        id: body
        run: |
          BODY="## Nightly Build — ${{ needs.check-changes.outputs.date }}"
          BODY="$BODY

          Built from commit \`${{ needs.check-changes.outputs.short_sha }}\` on \`main\`.

          **These are development builds and may be unstable.**

          ### Downloads"

          if [ -f artifacts/desktop-dmg/Forumline-nightly.dmg ]; then
            BODY="$BODY
          - **macOS**: \`Forumline-nightly.dmg\` — Open and drag to Applications"
          fi
          if [ -f artifacts/android-apk/Forumline-nightly.apk ]; then
            BODY="$BODY
          - **Android**: \`Forumline-nightly.apk\` — Enable \"Install from unknown sources\" to install"
          fi
          if [ -f artifacts/windows-exe/Forumline-nightly-windows.zip ]; then
            BODY="$BODY
          - **Windows**: \`Forumline-nightly-windows.zip\` — Extract and run Forumline.exe"
          fi
          if [ -f artifacts/linux-binary/Forumline-nightly-linux.tar.gz ]; then
            BODY="$BODY
          - **Linux**: \`Forumline-nightly-linux.tar.gz\` — Extract and run ./forumline"
          fi
          if [ -f artifacts/ios-simulator/Forumline-nightly-ios-simulator.zip ]; then
            BODY="$BODY
          - **iOS**: \`Forumline-nightly-ios-simulator.zip\` — Simulator build only (no code signing)"
          fi

          BODY="$BODY

          ---
          *This release is automatically replaced by the next nightly build.*"

          # Write to file to preserve newlines
          echo "$BODY" > release-body.md

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nightly-latest tag
        run: |
          git tag -f nightly-latest
          git push -f origin nightly-latest

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/desktop-dmg/Forumline-nightly.dmg release-files/ 2>/dev/null || true
          cp artifacts/android-apk/Forumline-nightly.apk release-files/ 2>/dev/null || true
          cp artifacts/windows-exe/Forumline-nightly-windows.zip release-files/ 2>/dev/null || true
          cp artifacts/linux-binary/Forumline-nightly-linux.tar.gz release-files/ 2>/dev/null || true
          cp artifacts/ios-simulator/Forumline-nightly-ios-simulator.zip release-files/ 2>/dev/null || true
          ls -la release-files/

      - name: Create nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ needs.check-changes.outputs.date }})"
          body_path: release-body.md
          files: release-files/*
          draft: false
          prerelease: true
