name: Deploy Hosted Forum Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/hosted/**'
      - 'services/forum/**'
      - 'packages/shared-go/**'
      - 'deploy/docker/Dockerfile.go-hosted'
      - '.github/workflows/deploy-hosted.yml'
      - 'deploy/compose/hosted/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt and upload env
        run: |
          SOPS_AGE_KEY="${{ secrets.SOPS_AGE_KEY }}" sops -d --input-type dotenv --output-type dotenv deploy/compose/hosted/.env.enc > /tmp/hosted.env
          scp /tmp/hosted.env hosted-prod:/opt/hosted/.env
          rm -f /tmp/hosted.env

      - name: Upload compose file
        run: scp deploy/compose/hosted/docker-compose.yml hosted-prod:/opt/hosted/docker-compose.yml

      - name: Pull latest code
        run: ssh hosted-prod "cd /opt/hosted/repo && git fetch origin main && git reset --hard origin/main"

      - name: Rebuild and restart
        run: ssh hosted-prod "cd /opt/hosted && docker compose up -d --build && docker compose ps"

      - name: Run Citus migration (idempotent)
        run: |
          ssh hosted-prod "cd /opt/hosted && cat repo/services/hosted/migrate-to-citus.sql | docker compose exec -T postgres psql -U postgres"
