name: Split Read-Only Repos

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared-go/**'
      - 'services/forum/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dagger/dagger-for-github@v7
        with:
          module: ci
          verb: call
          args: >-
            split-repos
            --source .
            --split-repo-token env:SPLIT_REPO_TOKEN
          version: "0.20.1"
        env:
          SPLIT_REPO_TOKEN: ${{ secrets.SPLIT_REPO_TOKEN }}
