pre-commit:
  parallel: true
  commands:
    lockfile-check:
      run: bash .githooks/lockfile-check.sh
      glob: "**/package.json"

    sops-check:
      run: bash .githooks/sops-check.sh
      glob: "**/.env*"

    gitleaks:
      run: gitleaks protect --staged --no-banner
      skip:
        - run: "! command -v gitleaks >/dev/null 2>&1"

    eslint-workspace:
      glob: "{services/forumline-web,packages}/**/*.{ts,tsx,js,mjs}"
      run: pnpm lint

    eslint-forum:
      root: "services/hosted/"
      glob: "src/**/*.js"
      run: pnpm lint

    golangci-lint:
      glob: "**/*.go"
      run: >
        cd packages/shared-go &&
        golangci-lint run ./... &&
        cd ../../services/forumline-api &&
        golangci-lint run ./... &&
        cd ../hosted &&
        golangci-lint run ./...

    go-test-shared:
      glob: "packages/shared-go/**/*.go"
      root: "packages/shared-go/"
      run: go test ./...

    go-test-api:
      glob: "{services/forumline-api,packages/shared-go}/**/*.go"
      root: "services/forumline-api/"
      run: go test ./...

    go-test-hosted:
      glob: "{services/hosted,packages/shared-go}/**/*.go"
      root: "services/hosted/"
      run: go test ./...

    ts-test:
      glob: "{services/forumline-web,packages}/**/*.{ts,tsx,js,mjs}"
      run: pnpm test

pre-push:
  parallel: true
  commands:
    github-actions-status:
      run: bash .githooks/pre-push
    validate-ci:
      run: bash .githooks/validate-ci.sh
      glob: "{.github/workflows/*.yml,deploy/docker/Dockerfile.*,packages/**}"
